192.168.1.135:
  topic: /livox/lidar

  # 初始外参（body坐标系下，单位：m / deg）
  x: -0.425
  y: -0.40
  z: 0.115
  roll: 0.0
  pitch: 22.0
  yaw: 90.0

  # 理想平面先验，统一按：n^T p + d = 0
  # 注意：
  # [ 1, 0, 0, 0.10]  表示 x = -0.10
  # [-1, 0, 0, 0.10]  表示 x =  0.10
  # [ 0, 1, 0, 0.12]  表示 y = -0.12
  # [ 0, 0,-1, 0.00]  表示 z =  0.00
  #
  # 这里建议写“真实可测、离原点有一定距离”的面，
  # 不建议都写成 0.001 这种过近值。
  planes:
    - [ 1.0, 0.0, 0.0, 0.01 ]   # 右/左侧参考面之一：x = -0.10
    - [ 0.0, 1.0, 0.0, 0.01 ]   # 前/后参考面之一：y = -0.10
    - [ 0.0, 0.0,-1.0, 0.01 ]   # 底面：z = 0.00

  # 每个平面的 LiDAR 坐标系下 ROI 包围盒（可选，但强烈建议）
  # 顺序必须与 planes 一一对应
  #
  # 这些范围不是“最终真值”，而是“提平面时允许搜索的空间范围”
  # 你需要按实际点云大概分布来调。
  plane_rois:
    # plane 0 对应的 ROI
    - xmin: -0.05
      xmax:  0.03
      ymin: -0.5
      ymax:  -0.0
      zmin: -0.05
      zmax:  0.5

    # plane 1 对应的 ROI
    - xmin: -0.5
      xmax:  0.03
      ymin: -0.05
      ymax:  0.05
      zmin: -0.05
      zmax:  0.5

    # plane 2 对应的 ROI
    - xmin: -0.5
      xmax:  0.05
      ymin: -0.5
      ymax:  0.05
      zmin: -0.02
      zmax:  0.06
